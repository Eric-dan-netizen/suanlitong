  #     - backend
  #   networks:
  #     - suanlitong

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - suanlitong

  # TODO: 生产环境切换为 PostgreSQL，MVP 阶段用 SQLite
