# 算力通 · 本地开发环境
version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./suanlitong.db
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
    volumes:
      - ./src:/app/src:ro
      - suanlitong_data:/app/data
    command: uvicorn src.backend.app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - suanlitong

  # TODO: 前端就绪后取消注释
  # frontend:
