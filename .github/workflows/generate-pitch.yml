name: Generate Pitch Deck

on:
  workflow_dispatch:
  push:
    paths:
      - "docs/pitch/Pitch-Deck.md"
      - "scripts/generate_pptx.py"

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install python-pptx
      - run: python scripts/generate_pptx.py
      - uses: actions/upload-artifact@v4
        with:
          name: pitch-deck
          path: docs/pitch/*.pptx
